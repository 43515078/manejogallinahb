<!DOCTYPE html><html lang="es">
<head>
  <title>🐔 Gallinas Hy-Line Brown</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { font-family: Arial, sans-serif; background: #f5f7fa; margin: 0; padding: 0; color: #333; }
    .container { max-width: 700px; margin: 0 auto; padding: 15px; }
    h1 { color: #b5651d; text-align: center; margin-bottom: 15px; }.tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #ddd; overflow-x: auto; }
.tab { flex-shrink: 0; padding: 10px 15px; cursor: pointer; background: #fff3e0; margin-right: 5px; border-radius: 5px 5px 0 0; }
.tab.active { background: #b5651d; color: white; font-weight: bold; }

.tab-content { display: none; }
.tab-content.active { display: block; }

.card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

.metricas { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
.metrica { text-align: center; padding: 15px; border-radius: 10px; color: white; font-weight: bold; }

.tipo-alimento { background: linear-gradient(45deg, #a67c52, #8c6239); }

input, button { width: 100%; padding: 12px; border-radius: 8px; margin: 8px 0; }
button { background: #b5651d; color: white; border: none; }

  </style>
</head><body>
<div class="container">
  <h1>🐔 MANEJO HY-LINE BROWN</h1>  <div class="tabs">
    <div class="tab active" onclick="mostrarTab('resumen')">Resumen</div>
  </div>  <div id="resumen" class="tab-content active">
    <div class="card">
      <input type="number" id="aves-iniciales" placeholder="Aves" />
      <input type="date" id="fecha-inicio" />
      <button onclick="iniciarLote()">Iniciar</button>
    </div><div class="card">
  <div class="metricas">
    <div class="metrica tipo-alimento">
      <h3>Alimento Hoy</h3>
      <p id="alimento">--</p>
    </div>
    <div class="metrica tipo-alimento">
      <h3>Próximo Alimento</h3>
      <p id="proximo">--</p>
    </div>
  </div>
</div>

  </div>
</div><script>
let datos = JSON.parse(localStorage.getItem('gallinasApp')) || { aves:0, fecha:null };

function getTipoAlimento(semana) {
  if (semana <= 3) return "Iniciación 1";
  if (semana <= 6) return "Iniciación 2";
  if (semana <= 12) return "Crecimiento";
  if (semana <= 15) return "Desarrollo";
  if (semana <= 17) return "Pre-Postura";
  return "Postura";
}

function getInicioSemanaAlimento(tipoActual, semanaActual) {
  for (let s = semanaActual + 1; s <= 100; s++) {
    if (getTipoAlimento(s) !== tipoActual) {
      return { semana: s, tipo: getTipoAlimento(s) };
    }
  }
  return null;
}

function fechaInicioSemana(fechaInicio, semana) {
  const fecha = new Date(fechaInicio);
  fecha.setDate(fecha.getDate() + ((semana - 1) * 7));
  return fecha;
}

function iniciarLote() {
  datos.aves = parseInt(document.getElementById('aves-iniciales').value);
  datos.fecha = document.getElementById('fecha-inicio').value;
  localStorage.setItem('gallinasApp', JSON.stringify(datos));
  actualizar();
}

function actualizar() {
  if (!datos.fecha) return;

  const hoy = new Date();
  const inicio = new Date(datos.fecha);
  const dias = Math.floor((hoy - inicio)/(1000*60*60*24));
  const semana = Math.floor(dias/7)+1;

  const alimento = getTipoAlimento(semana);
  document.getElementById('alimento').textContent = alimento;

  const proximo = getInicioSemanaAlimento(alimento, semana);
  if (proximo) {
    const fecha = fechaInicioSemana(datos.fecha, proximo.semana);
    document.getElementById('proximo').textContent = proximo.tipo + " " + fecha.toLocaleDateString('es-PE');
  }
}

function mostrarTab(id) {
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

actualizar();
</script></body>
</html>
